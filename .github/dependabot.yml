version: 2

updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
          - "org.springframework.security:*"
      testing:
        patterns:
          - "org.junit.*:*"
          - "org.assertj:*"
          - "com.h2database:*"
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
          - "org.sonatype.central:*"
          - "com.diffplug.spotless:*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci"
